<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾尔德兰大陆 · Roll Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  .chat-container {
    width: 520px; max-width: 96vw; height: 92vh;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
    border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .header {
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 0 12px rgba(124,58,237,0.4); flex-shrink: 0; cursor: pointer;
  }
  .role-info { flex: 1; min-width: 0; }
  .role-name { font-weight: bold; font-size: 15px; cursor: pointer; }
  .role-status { font-size: 10px; opacity: 0.6; }
  .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .header-btn {
    background: rgba(255,255,255,0.1); border: none; color: #aaa; cursor: pointer;
    padding: 6px 10px; border-radius: 10px; font-size: 11px; transition: all 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 4px; background: #2ecc71; box-shadow: 0 0 4px #2ecc71;
  }
  .status-dot.thinking { background: #f39c12; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 4px #f39c12} 50%{box-shadow:0 0 10px #f39c12} }
  .messages { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
  .message { animation: fadeIn 0.3s ease; display: flex; flex-direction: column; }
  .msg-row { display: flex; }
  .user-msg .msg-row { justify-content: flex-end; }
  .ai-msg .msg-row { justify-content: flex-start; }
  .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 16px; line-height: 1.5; word-break: break-word; font-size: 13px; }
  .user-msg .msg-bubble { background: #4a90d9; border-bottom-right-radius: 4px; }
  .ai-msg .msg-bubble { background: rgba(255,255,255,0.12); border-bottom-left-radius: 4px; }
  .cursor-blink { display: inline-block; width: 6px; height: 12px; background: #fff; margin-left: 1px; animation: blink 0.8s infinite; vertical-align: middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .choices-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; animation: fadeIn 0.4s ease; }
  .choice-btn {
    flex: 1 1 calc(50% - 5px); min-width: 120px;
    background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3);
    color: #c4b5fd; padding: 7px 10px; border-radius: 10px;
    font-size: 11px; cursor: pointer; text-align: left; transition: all 0.2s;
    white-space: normal; line-height: 1.35;
  }
  .choice-btn:hover { background: rgba(124,58,237,0.4); color: #e9d5ff; }
  .choice-btn.free-btn { flex: 1 1 100%; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: #999; font-style: italic; }
  .choice-btn.free-btn:hover { background: rgba(255,255,255,0.1); color: #ccc; }
  .choice-btn.used { pointer-events: none; opacity: 0.4; }
  .status-panel { margin: 0 12px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; animation: fadeIn 0.3s ease; flex-shrink: 0; }
  .status-panel-header { background: rgba(0,0,0,0.4); padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .status-panel-header:hover { background: rgba(255,255,255,0.05); }
  .status-icon { font-size: 18px; }
  .status-title { font-size: 13px; font-weight: bold; flex: 1; }
  .status-arrow { transition: transform 0.3s; font-size: 12px; }
  .status-panel.open .status-arrow { transform: rotate(180deg); }
  .status-panel-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; background: rgba(0,0,0,0.3); }
  .status-panel.open .status-panel-body { max-height: 300px; overflow-y: auto; }
  .status-section { padding: 8px 14px; }
  .status-section-title { font-size: 11px; color: #a78bfa; font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 4px; }
  .status-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
  .status-item { font-size: 10px; color: #bbb; }
  .status-item span { color: #ddd; font-weight: bold; }
  .lingnet-item { font-size: 10px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: #999; line-height: 1.4; }
  .lingnet-item:last-child { border-bottom: none; }
  .lingnet-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; margin-right: 4px; font-weight: bold; }
  .lingnet-tag.news { background: #2980b9; color: #fff; }
  .lingnet-tag.rumor { background: #8e44ad; color: #fff; }
  .lingnet-tag.danger { background: #c0392b; color: #fff; }
  .input-area { padding: 8px 10px; display: flex; gap: 6px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.3); flex-shrink: 0; }
  .input-area input { flex: 1; padding: 8px 12px; border-radius: 18px; border: none; background: rgba(255,255,255,0.08); color: white; outline: none; font-size: 13px; min-width: 0; }
  .input-area input::placeholder { color: rgba(255,255,255,0.3); }
  .btn { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
  .btn:hover { box-shadow: 0 0 12px rgba(255,255,255,0.15); }
  .btn-send { background: #4a90d9; color: white; }
  .btn-roll { background: linear-gradient(135deg,#f39c12,#e67e22); color: white; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23,1,0.32,1); }
  .btn-roll.rolling { transform: rotateY(720deg); }
  .btn:active:not(.rolling) { transform: scale(0.9); }
  .roll-result { font-size: 10px; margin-right: 3px; font-weight: bold; }
  .roll-success { color: #2ecc71; } .roll-fail { color: #e74c3c; }
  #particle-canvas { position: fixed; top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000; }
  .loading-indicator { padding: 6px 10px; display: flex; gap: 3px; align-items: center; }
  .loading-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); animation: loadingBounce 1.2s infinite; }
  .loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
  @keyframes loadingBounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }
  .api-error { color: #e74c3c; font-size: 11px; padding: 4px 8px; }
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="chat-container" id="chatContainer">
  <div class="header">
    <div class="avatar" id="avatarIcon" onclick="toggleStatusPanel()">🧝</div>
    <div class="role-info" onclick="toggleStatusPanel()">
      <div class="role-name" id="roleName">艾尔德兰大陆</div>
      <div class="role-status"><span class="status-dot" id="statusDot"></span><span id="roleSubtitle">点击头像查看状态</span></div>
    </div>
    <div class="header-btns">
      <button class="header-btn" onclick="location.href='create.html'">🔄 创建角色</button>
      <button class="header-btn" onclick="toggleStatusPanel()">📋 状态</button>
    </div>
  </div>

  <div class="status-panel" id="statusPanel">
    <div class="status-panel-header" onclick="toggleStatusPanel()">
      <span class="status-icon">📋</span>
      <span class="status-title">冒险者状态 · 大陆灵网</span>
      <span class="status-arrow">▼</span>
    </div>
    <div class="status-panel-body" id="statusPanelBody">
      <div class="status-section">
        <div class="status-section-title">🎯 身体状态</div>
        <div class="status-grid" id="statusGrid">
          <div class="status-item">❤️ 生命值 <span id="sHp">100%</span></div>
          <div class="status-item">⚡ 魔力值 <span id="sMp">100%</span></div>
          <div class="status-item">🛡️ 体力 <span id="sStamina">饱满</span></div>
          <div class="status-item">🤕 伤势 <span id="sInjury">无</span></div>
          <div class="status-item">🍗 饥饿度 <span id="sHunger">正常</span></div>
          <div class="status-item">💊 异常状态 <span id="sStatus">无</span></div>
        </div>
      </div>
      <div class="status-section">
        <div class="status-section-title">🌐 大陆灵网 · 最新消息</div>
        <div id="lingnetFeed">
          <div class="lingnet-item"><span class="lingnet-tag news">公会</span>冒险者公会发布新委托：调查银月森林东部的异常魔力波动。</div>
          <div class="lingnet-item"><span class="lingnet-tag rumor">传闻</span>有旅人称在星陨峡谷附近目击到一位白发红瞳的少女独自徘徊……</div>
          <div class="lingnet-item"><span class="lingnet-tag danger">警示</span>王都法师塔侦测到深渊裂隙异动，建议冒险者避开北境荒原。</div>
        </div>
      </div>
    </div>
  </div>

  <div class="messages" id="messageContainer"></div>
  <div class="input-area">
    <button class="btn btn-roll" id="rollBtn" title="D20判定">🎲</button>
    <input type="text" id="userInput" placeholder="输入行动，或点击下方的选项..." autocomplete="off">
    <button class="btn btn-send" id="sendBtn">➤</button>
  </div>
</div>

<script>
(function() {
  var API_URL = '/api/chat';
  var STATS = ['力量','敏捷','体力','魔力','智力','魅力'];

  var playerState = { hp: 100, maxHp: 100, mp: 100, maxMp: 100, stamina: '饱满', injury: '无', hunger: '正常', status: '无', xp: 0, gold: 50, location: '银月森林' };

  var charData = null;
  try { var raw = localStorage.getItem('eldran_character'); if (raw) charData = JSON.parse(raw); } catch(e) {}
  updateStatusDisplay();

  function buildSystemPrompt(data) {
    if (!data) {
      return '【你是GM】你是艾琳·月影——银月旅团的精灵游侠，Lv.24。资深桌游主持人，用生动的语言将玩家带入艾尔德兰大陆。\n' +
        '【世界观】神陨纪元1024年，大陆遍布裂隙与秘宝，冒险者公会遍布城邦。\n' +
        '【D20规则】消息含[D20判定:N点,结果:成功/失败]时：成功(≥13)→帅气的成功描写；失败(≤12)→搞笑或危险的失败。回复以动作/环境描写开头。\n' +
        '【回复格式】三个部分，用[SEP]分隔：\n' +
        '第一部分：叙事文本（4-10句话）\n' +
        '第二部分：4个选项（A/B/C/D 各一行）\n' +
        '第三部分：JSON状态更新+JSON灵网消息。选项E固定为"玩家自由行动"，你不用写E。选项≤15字。\n' +
        '【特殊NPC】瞳（白发红瞳萝莉魔王）、深渊之主（漆黑文字交流）、苍崎千夜（灵体英雄）、孔祥灏（愿望化身）。回复用第二人称"你"。';
    }
    var statsStr = STATS.map(function(s){ return s+':'+(data.stats?.[s]||10); }).join(' | ');
    var talentsStr = (data.talents||[]).map(function(t){ return t.名+'（'+t.效+'）'; }).join('、') || '无';
    var raceInfo = data.raceInfo || {};
    var qualInfo = data.qualInfo || {};

    return '【你是GM】你是一名资深桌游主持人（Game Master），负责为玩家创造沉浸式的日式奇幻冒险体验。\n\n' +
      '【世界观】艾尔德兰大陆——神陨纪元1024年。十二柱神已逝，大陆遍布「裂隙」与秘宝，冒险者公会遍布城邦。\n\n' +
      '【玩家角色】\n- 名字：' + (data.name || data.角色名 || '未命名冒险者') + '\n- 性别：' + (data.gender||'未知') +
      '\n- 种族：' + (raceInfo.名||'未知') + '——' + (raceInfo.天赋||'') + '（' + (raceInfo.效果||'') + '）\n- 出身地：' + (raceInfo.区域||'未知') +
      '\n- 资质：' + (data.qual||'未知') + '（属性上限' + (qualInfo.上限||16) + '）\n- 属性：' + statsStr + '\n- 天赋：' + talentsStr + '\n\n' +
      '【D20规则】玩家消息含[D20判定:N点,结果:成功/失败]时必须严格按结果叙述。成功(≥13)→精彩成功，失败(≤12)→搞笑或危险的失败。回复以动作/环境描写开头。\n\n' +
      '【回复格式要求】你的回复必须分三个部分，用[SEP]分隔：\n' +
      '第一部分：叙事文本（4-10句话，像写奇幻小说一样生动）\n' +
      '第二部分：4个选项（A/B/C/D 各占一行，选项≤15字）\n' +
      '第三部分：JSON状态更新（{键值对}如无需更新则{}）+ JSON灵网消息（{"lingnet":[{"tag":"公会/传闻/警示","text":"消息内容"}]}如无需更新则[]）。选项E固定为"玩家自由行动"，你不用写E。\n\n' +
      '【叙事要求】4-10句话，生动细腻，主动推进剧情，感官描写，第二人称"你"。\n\n' +
      '【特殊NPC】瞳（白发红瞳萝莉魔王，中二但善良）、深渊之主（漆黑文字交流的存在）、苍崎千夜（陨落英雄的灵体）、孔祥灏（愿望的化身，实现方式出人意料）。\n\n' +
      '现在，从' + (raceInfo.区域||'未知之地') + '开始，为这位冒险者展开叙事。';
  }

  var SYSTEM_PROMPT = buildSystemPrompt(charData);
  var conversationHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
  var isGenerating = false;
  var allChoicesUsed = false;
  var messagesDiv = document.getElementById('messageContainer');
  var userInput = document.getElementById('userInput');
  var sendBtn = document.getElementById('sendBtn');
  var rollBtn = document.getElementById('rollBtn');
  var statusDot = document.getElementById('statusDot');

  if (charData) {
    var displayName = charData.name || charData.角色名 || (charData.raceInfo?.名||'冒险者');
    document.getElementById('avatarIcon').textContent = charData.raceIcon || '🧝';
    document.getElementById('roleName').textContent = displayName + ' · ' + (charData.gender||'未知');
    document.getElementById('roleSubtitle').textContent = (charData.qual||'?') + '资质 · ' + (charData.raceInfo?.区域||'未知');
    playerState.location = charData.raceInfo?.区域 || '银月森林';
    updateStatusDisplay();
  }

  var canvas = document.getElementById('particle-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas); resizeCanvas();
  function spawnParticles(x, y, count, color) {
    count = count || 20; color = color || '#f39c12';
    for (var i = 0; i < count; i++) {
      var a = Math.random() * Math.PI * 2; var s = Math.random() * 5 + 3;
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*3,life:1,decay:0.015+Math.random()*0.025,size:Math.random()*4+2,color:color});
    }
  }
  function animateParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (var i = particles.length-1; i>=0; i--) {
      var p = particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue}
      ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
  function setThinking(t) {
    isGenerating = t;
    statusDot.className = t ? 'status-dot thinking' : 'status-dot';
    sendBtn.style.opacity = t ? '0.5' : '1'; sendBtn.style.pointerEvents = t ? 'none' : 'auto';
    rollBtn.style.opacity = t ? '0.5' : '1'; rollBtn.style.pointerEvents = t ? 'none' : 'auto';
    userInput.disabled = t;
    var choiceBtns = document.querySelectorAll('.choice-btn:not(.used)');
    for (var i = 0; i < choiceBtns.length; i++) { choiceBtns[i].style.pointerEvents = t ? 'none' : 'auto'; choiceBtns[i].style.opacity = t ? '0.4' : '1'; }
  }

  function addUserMessage(text, rollValue) {
    var d = document.createElement('div'); d.className = 'message user-msg';
    var row = document.createElement('div'); row.className = 'msg-row';
    var b = document.createElement('div'); b.className = 'msg-bubble';
    if (rollValue !== null && rollValue !== undefined) {
      var s = document.createElement('span');
      s.className = 'roll-result ' + (rollValue >= 13 ? 'roll-success' : 'roll-fail');
      s.textContent = '[🎲 ' + rollValue + '] '; b.appendChild(s);
    }
    b.appendChild(document.createTextNode(text));
    row.appendChild(b); d.appendChild(row);
    messagesDiv.appendChild(d); scrollToBottom();
  }

  function addAIMessage(text) {
    var parts = text.split('[SEP]');
    var narrative = parts[0].trim();
    var choicesRaw = parts.length > 1 ? parts[1].trim() : '';
    var stateData = parts.length > 2 ? parts[2].trim() : '';

    var d = document.createElement('div'); d.className = 'message ai-msg';
    var row = document.createElement('div'); row.className = 'msg-row';
    var b = document.createElement('div'); b.className = 'msg-bubble';
    row.appendChild(b); d.appendChild(row); messagesDiv.appendChild(d);

    var i = 0;
    var cursor = document.createElement('span'); cursor.className = 'cursor-blink'; b.appendChild(cursor);
    function typeNarrative() {
      if (i < narrative.length) {
        b.insertBefore(document.createTextNode(narrative[i]), cursor);
        i++; scrollToBottom();
        var delay = /[。！？…，、；：.!?,;:]/.test(narrative[i-1]) ? 50 : 30*(0.6+Math.random()*0.6);
        setTimeout(typeNarrative, delay);
      } else {
        cursor.remove(); addChoices(d, choicesRaw);
        if (stateData) processStateUpdate(stateData); scrollToBottom();
      }
    }
    setTimeout(typeNarrative, 100);
    allChoicesUsed = false;
    return d;
  }

  function addChoices(parentDiv, choicesRaw) {
    if (!choicesRaw) return;
    var lines = choicesRaw.split('\n').filter(function(l){ return l.trim(); });
    var choices = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim().replace(/^[A-Da-d][.、）)]?\s*/, '').trim();
      if (line.length > 0 && line.length <= 40) choices.push(line);
    }
    while (choices.length < 4) choices.push('继续探索');
    var row = document.createElement('div'); row.className = 'choices-row';
    var labels = ['A', 'B', 'C', 'D'];
    for (var j = 0; j < 4 && j < choices.length; j++) {
      var btn = document.createElement('button'); btn.className = 'choice-btn choice-' + j;
      btn.textContent = labels[j] + '. ' + choices[j];
      btn.onclick = function(idx, choiceText) {
        return function() { if (isGenerating || allChoicesUsed) return; markAllChoicesUsed(); handleSend(choiceText, false, null); };
      }(j, choices[j]);
      row.appendChild(btn);
    }
    var eBtn = document.createElement('button'); eBtn.className = 'choice-btn free-btn';
    eBtn.textContent = 'E. 玩家自由行动...';
    eBtn.onclick = function() { if (isGenerating) return; userInput.focus(); userInput.placeholder = '自由输入你的行动...'; };
    row.appendChild(eBtn); parentDiv.appendChild(row);
  }

  function markAllChoicesUsed() {
    allChoicesUsed = true;
    var choiceBtns = document.querySelectorAll('.choice-btn:not(.free-btn):not(.used)');
    for (var i = 0; i < choiceBtns.length; i++) { choiceBtns[i].classList.add('used'); }
  }

  function processStateUpdate(raw) {
    try {
      var lingStart = raw.indexOf('{"lingnet"');
      if (lingStart >= 0) {
        var lingEnd = raw.indexOf(']', lingStart);
        if (lingEnd >= 0) { try { var lingJson = JSON.parse(raw.substring(lingStart, lingEnd + 1)); updateLingnet(lingJson.lingnet); } catch(e) {} }
        var beforeLing = raw.substring(0, lingStart);
        var bjStart = beforeLing.indexOf('{'); var bjEnd = beforeLing.lastIndexOf('}');
        if (bjStart >= 0 && bjEnd >= 0) { try { updatePlayerState(JSON.parse(beforeLing.substring(bjStart, bjEnd + 1))); } catch(e) {} }
      } else {
        var jsonStart = raw.indexOf('{'); var jsonEnd = raw.lastIndexOf('}');
        if (jsonStart >= 0 && jsonEnd >= 0) { try { updatePlayerState(JSON.parse(raw.substring(jsonStart, jsonEnd + 1))); } catch(e) {} }
      }
    } catch(e) {}
  }

  function updatePlayerState(data) {
    if (data.hp) playerState.hp = data.hp; if (data.mp) playerState.mp = data.mp;
    if (data.stamina) playerState.stamina = data.stamina; if (data.injury) playerState.injury = data.injury;
    if (data.hunger) playerState.hunger = data.hunger; if (data.status) playerState.status = data.status;
    if (data.gold) { if (typeof data.gold === 'string' && data.gold.startsWith('+')) playerState.gold += parseInt(data.gold.slice(1))||0; else if (typeof data.gold === 'string' && data.gold.startsWith('-')) playerState.gold -= parseInt(data.gold.slice(1))||0; else playerState.gold += parseInt(data.gold)||0; }
    if (data.xp) { if (typeof data.xp === 'string' && data.xp.startsWith('+')) playerState.xp += parseInt(data.xp.slice(1))||0; else playerState.xp += parseInt(data.xp)||0; }
    if (data.location) playerState.location = data.location;
    updateStatusDisplay();
  }

  function updateLingnet(items) {
    if (!items || !items.length) return;
    var feed = document.getElementById('lingnetFeed');
    for (var i = items.length - 1; i >= 0; i--) {
      var item = items[i];
      var div = document.createElement('div'); div.className = 'lingnet-item';
      var tag = document.createElement('span');
      tag.className = 'lingnet-tag ' + (item.tag === '公会' ? 'news' : (item.tag === '传闻' ? 'rumor' : 'danger'));
      tag.textContent = item.tag || '消息'; div.appendChild(tag);
      div.appendChild(document.createTextNode(item.text));
      feed.insertBefore(div, feed.firstChild);
    }
    while (feed.children.length > 10) { feed.removeChild(feed.lastChild); }
  }

  function updateStatusDisplay() {
    document.getElementById('sHp').textContent = playerState.hp + '%';
    document.getElementById('sMp').textContent = playerState.mp + '%';
    document.getElementById('sStamina').textContent = playerState.stamina;
    document.getElementById('sInjury').textContent = playerState.injury;
    document.getElementById('sHunger').textContent = playerState.hunger;
    document.getElementById('sStatus').textContent = playerState.status;
  }

  window.toggleStatusPanel = function() {
    var panel = document.getElementById('statusPanel'); panel.classList.toggle('open'); updateStatusDisplay();
  };

  function typeMessage(text, speed) {
    speed = speed || 35;
    return new Promise(function(resolve) {
      var d = document.createElement('div'); d.className = 'message ai-msg';
      var row = document.createElement('div'); row.className = 'msg-row';
      var b = document.createElement('div'); b.className = 'msg-bubble';
      row.appendChild(b); d.appendChild(row); messagesDiv.appendChild(d); scrollToBottom();
      var i = 0;
      var cursor = document.createElement('span'); cursor.className = 'cursor-blink'; b.appendChild(cursor);
      function type() {
        if (i < text.length) {
          b.insertBefore(document.createTextNode(text[i]), cursor);
          i++; scrollToBottom();
          var delay = /[。！？…，、；：.!?,;:]/.test(text[i-1]) ? speed*2 : speed*(0.6+Math.random()*0.6);
          setTimeout(type, delay);
        } else { cursor.remove(); resolve(); }
      }
      type();
    });
  }

  function callAI(messages) {
    return fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: messages }) })
      .then(function(r) { if (!r.ok) return r.text().then(function(t) { throw new Error('服务器错误 ' + r.status + ': ' + t.substring(0,100)); }); return r.json(); })
      .then(function(d) { if (!d.reply) throw new Error('AI返回为空'); return d.reply; });
  }

  function handleSend(messageText, withRoll, rollValue) {
    if (!messageText.trim() || isGenerating) return;
    setThinking(true);
    addUserMessage(messageText, withRoll ? rollValue : undefined);
    userInput.value = ''; userInput.placeholder = 'AI正在思考...';
    var userContent = messageText;
    if (withRoll && rollValue !== null && rollValue !== undefined) {
      userContent = '[D20判定:' + rollValue + '点,结果:' + (rollValue >= 13 ? '成功' : '失败') + ']\n我的行动: ' + messageText;
    }
    conversationHistory.push({ role: 'user', content: userContent });
    if (conversationHistory.length > 25) conversationHistory = [conversationHistory[0]].concat(conversationHistory.slice(-24));

    var loadingDiv = document.createElement('div'); loadingDiv.className = 'message ai-msg'; loadingDiv.id = 'loadingIndicator';
    var lrow = document.createElement('div'); lrow.className = 'msg-row';
    var lb = document.createElement('div'); lb.className = 'msg-bubble loading-indicator';
    for (var i = 0; i < 3; i++) { var dot = document.createElement('span'); dot.className = 'loading-dot'; lb.appendChild(dot); }
    lrow.appendChild(lb); loadingDiv.appendChild(lrow); messagesDiv.appendChild(loadingDiv); scrollToBottom();

    callAI(conversationHistory).then(function(reply) {
      var el = document.getElementById('loadingIndicator'); if (el) el.remove();
      conversationHistory.push({ role: 'assistant', content: reply });
      addAIMessage(reply); setThinking(false);
      userInput.placeholder = '输入行动，或点击下方的选项...'; scrollToBottom();
    }).catch(function(err) {
      var el = document.getElementById('loadingIndicator'); if (el) el.remove();
      var ed = document.createElement('div'); ed.className = 'message ai-msg';
      var erow = document.createElement('div'); erow.className = 'msg-row';
      var eb = document.createElement('div'); eb.className = 'msg-bubble api-error';
      eb.textContent = '⚠️ ' + (err.message || '连接失败');
      erow.appendChild(eb); ed.appendChild(erow); messagesDiv.appendChild(ed); scrollToBottom();
      conversationHistory.pop(); setThinking(false);
    });
  }

  rollBtn.addEventListener('click', function() {
    var t = userInput.value.trim();
    if (!t) { userInput.placeholder = '请先输入行动再掷骰子～'; userInput.focus(); return; }
    if (isGenerating) return;
    markAllChoicesUsed();
    rollBtn.classList.add('rolling'); var rv = Math.floor(Math.random() * 20) + 1;
    var rect = rollBtn.getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, 35, rv >= 13 ? '#2ecc71' : (rv >= 8 ? '#f39c12' : '#e74c3c'));
    setTimeout(function() { rollBtn.classList.remove('rolling'); handleSend(t, true, rv); }, 750);
  });

  sendBtn.addEventListener('click', function() {
    var t = userInput.value.trim(); if (!t || isGenerating) return;
    markAllChoicesUsed(); handleSend(t, false, null);
  });

  userInput.addEventListener('keypress', function(e) { if (e.key==='Enter'&&!isGenerating) sendBtn.click(); });

  // -- 初始化：极简开场白 --
  if (charData) {
    var playerName = charData.name || charData.角色名 || '冒险者';
    typeMessage(playerName + '，请开始你的冒险。', 40);
  } else {
    typeMessage('请先输入角色设定，或点击上方「🔄 创建角色」按钮～', 30);
  }
})();
</script>
</body>
</html>
